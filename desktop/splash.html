<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polri BWC Command Center</title>
  <style>
    :root {
      --bg: #081523;
      --panel: rgba(15, 35, 58, 0.92);
      --line: rgba(139, 180, 226, 0.18);
      --accent: #d11f1f;
      --accent-2: #2c79d3;
      --text: #f4f8ff;
      --muted: #8fa8c5;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(44, 121, 211, 0.24), transparent 40%),
        radial-gradient(circle at bottom right, rgba(209, 31, 31, 0.18), transparent 35%),
        var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .shell {
      width: min(380px, calc(100vw - 40px));
      padding: 28px 26px;
      border-radius: 26px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 24px 60px rgba(3, 10, 18, 0.45);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(139, 180, 226, 0.2);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #ff6f6f);
      box-shadow: 0 0 0 6px rgba(209, 31, 31, 0.12);
    }

    h1 {
      margin: 18px 0 10px;
      font-size: 28px;
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .bar {
      margin-top: 22px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
      position: relative;
    }

    .bar::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 45%;
      border-radius: inherit;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      animation: load 1.4s ease-in-out infinite;
    }

    @keyframes load {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(250%); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="eyebrow"><span class="dot"></span> Command Center</div>
    <h1>Polri BWC</h1>
    <p>Menyiapkan dashboard command center tanpa address bar agar operator langsung masuk ke mode operasional.</p>
    <div class="bar"></div>
  </div>
</body>
</html>
