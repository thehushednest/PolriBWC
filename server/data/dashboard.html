<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polri BWC · Command Center</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--border:#21262d;
    --text:#e6edf3;--muted:#7d8590;--blue:#2f81f7;--green:#3fb950;
    --red:#f85149;--orange:#d29922;--purple:#a371f7;--teal:#39c5cf;
  }
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* ── HEADER ── */
  header{
    display:flex;align-items:center;gap:16px;padding:10px 20px;
    background:var(--surface);border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .logo{display:flex;align-items:center;gap:10px}
  .logo-icon{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
  .logo-text{font-size:15px;font-weight:700;letter-spacing:.3px}
  .logo-sub{font-size:11px;color:var(--muted);font-weight:400}
  .header-stats{display:flex;gap:20px;margin-left:auto}
  .hstat{display:flex;flex-direction:column;align-items:center}
  .hstat-val{font-size:20px;font-weight:700;line-height:1}
  .hstat-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
  .hstat.green .hstat-val{color:var(--green)}
  .hstat.red .hstat-val{color:var(--red)}
  .hstat.orange .hstat-val{color:var(--orange)}
  .hstat.blue .hstat-val{color:var(--blue)}
  .clock{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text);margin-left:20px}
  .pulse{display:inline-block;width:8px;height:8px;background:var(--green);border-radius:50%;margin-right:6px;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
  .server-badge{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--green);font-weight:600}

  /* ── LAYOUT ── */
  .main-grid{display:grid;grid-template-columns:280px 1fr 300px;gap:0;flex:1;overflow:hidden}

  /* ── LEFT PANEL ── */
  .panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .panel-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .panel-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
  .badge{background:var(--blue);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700}
  .badge.green{background:var(--green)}
  .badge.red{background:var(--red)}
  .panel-body{flex:1;overflow-y:auto;padding:10px}
  .panel-body::-webkit-scrollbar{width:4px}
  .panel-body::-webkit-scrollbar-track{background:transparent}
  .panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  /* ── OFFICER CARD ── */
  .officer-card{
    background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;
  }
  .officer-card:hover{border-color:var(--blue)}
  .officer-card.talking{border-color:var(--red)}
  .officer-row{display:flex;align-items:center;gap:10px}
  .officer-avatar{
    width:36px;height:36px;border-radius:9px;background:var(--blue);
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;flex-shrink:0;
  }
  .officer-avatar.offline{background:var(--border)}
  .officer-avatar.recording{background:var(--green)}
  .officer-avatar.talking{background:var(--red);animation:pulse 1s infinite}
  .officer-name{font-size:13px;font-weight:600;line-height:1.2}
  .officer-detail{font-size:11px;color:var(--muted);margin-top:2px}
  .officer-meta{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
  .tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;background:var(--border);color:var(--muted)}
  .tag.online{background:rgba(63,185,80,.15);color:var(--green)}
  .tag.offline{background:rgba(248,81,73,.1);color:var(--red)}
  .tag.recording{background:rgba(63,185,80,.15);color:var(--green)}
  .tag.talking{background:rgba(248,81,73,.15);color:var(--red)}
  .tag.ch{background:rgba(47,129,247,.15);color:var(--blue)}
  .tag.loc{background:rgba(57,197,207,.1);color:var(--teal)}
  .no-data{color:var(--muted);font-size:12px;text-align:center;padding:40px 16px;line-height:1.6}

  /* ── MAP ── */
  .map-section{display:flex;flex-direction:column;overflow:hidden}
  .map-toolbar{padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
  .map-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
  .map-btn:hover{border-color:var(--blue);color:var(--blue)}
  .map-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
  #map{flex:1}

  /* ── RIGHT PANEL ── */
  .right-panel{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .tabs-bar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
  .tab-btn{flex:1;padding:10px 6px;background:none;border:none;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid transparent;transition:all .15s}
  .tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
  .tab-btn:hover:not(.active){color:var(--text)}
  .tab-content{display:none;flex:1;overflow-y:auto;padding:10px}
  .tab-content.active{display:flex;flex-direction:column;gap:6px}
  .tab-content::-webkit-scrollbar{width:4px}
  .tab-content::-webkit-scrollbar-track{background:transparent}
  .tab-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  /* ── FEED ITEMS ── */
  .feed-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px}
  .feed-item-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .feed-avatar{width:28px;height:28px;border-radius:7px;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
  .feed-name{font-size:12px;font-weight:600}
  .feed-meta{font-size:11px;color:var(--muted);margin-top:3px}
  .feed-time{font-size:10px;color:var(--muted);white-space:nowrap}
  .feed-desc{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5}
  .status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .dot-green{background:var(--green)}
  .dot-red{background:var(--red)}
  .dot-orange{background:var(--orange)}
  .dot-blue{background:var(--blue)}
  .dot-muted{background:var(--muted)}

  /* ── REFRESH BAR ── */
  .refresh-bar{padding:6px 14px;border-top:1px solid var(--border);background:var(--surface);font-size:10px;color:var(--muted);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .refresh-bar span{font-family:monospace}

  /* ── LEAFLET OVERRIDE ── */
  .leaflet-container{background:#1a2332}
  .leaflet-control-attribution{background:rgba(13,17,23,.8)!important;color:var(--muted)!important}
  .leaflet-control-attribution a{color:var(--blue)!important}
  .officer-marker-pin{
    width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:12px;font-weight:700;color:#fff;
    border:2.5px solid rgba(255,255,255,.25);box-shadow:0 2px 8px rgba(0,0,0,.5);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📡</div>
    <div>
      <div class="logo-text">Polri BWC</div>
      <div class="logo-sub">Command Center</div>
    </div>
  </div>
  <div class="server-badge"><span class="pulse"></span><span id="server-label">Menghubungkan…</span></div>
  <div class="header-stats">
    <div class="hstat green"><div class="hstat-val" id="h-online">0</div><div class="hstat-lbl">Online</div></div>
    <div class="hstat red"><div class="hstat-val" id="h-recording">0</div><div class="hstat-lbl">Rekam</div></div>
    <div class="hstat orange"><div class="hstat-val" id="h-pending">0</div><div class="hstat-lbl">Pending</div></div>
    <div class="hstat blue"><div class="hstat-val" id="h-reports">0</div><div class="hstat-lbl">Laporan</div></div>
  </div>
  <div class="clock" id="clock">--:--:--</div>
</header>

<div class="main-grid">

  <!-- LEFT: Officer roster -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Personel</span>
      <span class="badge green" id="online-badge">0 Online</span>
    </div>
    <div class="panel-body" id="officer-list">
      <div class="no-data">Memuat data personel…</div>
    </div>
  </div>

  <!-- CENTER: Map -->
  <div class="map-section">
    <div class="map-toolbar">
      <button class="map-btn active" id="btn-all" onclick="setFilter('all')">Semua</button>
      <button class="map-btn" id="btn-online" onclick="setFilter('online')">Online</button>
      <button class="map-btn" id="btn-recording" onclick="setFilter('recording')">Rekam</button>
      <button class="map-btn" id="btn-talking" onclick="setFilter('talking')">PTT Aktif</button>
      <button class="map-btn" style="margin-left:auto" onclick="fitMarkers()">⊡ Fit semua</button>
    </div>
    <div id="map"></div>
  </div>

  <!-- RIGHT: Activity feeds -->
  <div class="right-panel">
    <div class="tabs-bar">
      <button class="tab-btn active" onclick="switchTab('ptt',this)">PTT Log</button>
      <button class="tab-btn" onclick="switchTab('recordings',this)">Rekaman</button>
      <button class="tab-btn" onclick="switchTab('reports',this)">Laporan</button>
    </div>
    <div class="tab-content active" id="tab-ptt"></div>
    <div class="tab-content" id="tab-recordings"></div>
    <div class="tab-content" id="tab-reports"></div>
    <div class="refresh-bar">
      <span>Auto-refresh setiap 5 detik</span>
      <span id="last-refresh">-</span>
    </div>
  </div>

</div>

<script>
// ── CONFIG ──────────────────────────────────────────
const BASE = window.location.origin; // e.g. http://192.168.1.26:8787
const API  = BASE + '/api/v1';
const REFRESH_MS = 5000;

// ── MAP SETUP ───────────────────────────────────────
const DEFAULT_CENTER = [-6.2088, 106.8456]; // Jakarta
const map = L.map('map', {
  center: DEFAULT_CENTER, zoom: 13,
  zoomControl: true, attributionControl: true,
});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19,
}).addTo(map);

let markers = {};    // username → L.marker
let allPresence = [];
let activeFilter = 'all';

// ── FILTER ──────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  ['all','online','recording','talking'].forEach(id => {
    document.getElementById('btn-'+id).classList.toggle('active', id===f);
  });
  renderMarkers();
}

function officerVisible(e) {
  if (activeFilter === 'online')    return e.resolvedStatus === 'online';
  if (activeFilter === 'recording') return e.status === 'recording';
  if (activeFilter === 'talking')   return e.isTalking === true;
  return true;
}

// ── MARKER COLOR ────────────────────────────────────
function markerColor(e) {
  if (e.isTalking)              return '#f85149'; // red  — PTT
  if (e.status === 'recording') return '#3fb950'; // green — recording
  if (e.resolvedStatus === 'online') return '#2f81f7'; // blue  — standby
  return '#7d8590'; // grey  — offline
}

function makeIcon(e) {
  const color = markerColor(e);
  const html = `<div class="officer-marker-pin" style="background:${color}">${initials(e.username)}</div>`;
  return L.divIcon({ html, className:'', iconSize:[34,34], iconAnchor:[17,17], popupAnchor:[0,-18] });
}

function initials(username) {
  const clean = (username||'').replace(/[^A-Za-z0-9]/g,'');
  return (clean.substring(0,2)||'??').toUpperCase();
}

function popupHtml(e) {
  const ch = e.activeChannelId ? e.activeChannelId.toUpperCase() : '-';
  const loc = (e.latitude && e.longitude)
    ? `${e.latitude.toFixed(5)}, ${e.longitude.toFixed(5)}`
    : 'Lokasi tidak tersedia';
  const statusBg = e.resolvedStatus === 'online' ? '#3fb950' : '#f85149';
  const since = e.lastSeenIso ? new Date(e.lastSeenIso).toLocaleTimeString('id-ID') : '-';
  return `
    <div style="font-family:Segoe UI,system-ui,sans-serif;min-width:180px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="width:32px;height:32px;border-radius:8px;background:${markerColor(e)};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff">${initials(e.username)}</div>
        <div>
          <div style="font-weight:700;font-size:13px">${e.username}</div>
          <div style="font-size:11px;color:#888">${e.deviceId || '-'}</div>
        </div>
      </div>
      <table style="width:100%;font-size:11px;border-collapse:collapse">
        <tr><td style="color:#888;padding:2px 0">Status</td><td style="font-weight:600;color:${statusBg}">${e.resolvedStatus}</td></tr>
        <tr><td style="color:#888;padding:2px 0">Kanal</td><td>${ch}</td></tr>
        <tr><td style="color:#888;padding:2px 0">GPS</td><td style="font-family:monospace">${loc}</td></tr>
        <tr><td style="color:#888;padding:2px 0">Terakhir</td><td>${since}</td></tr>
        ${e.isTalking ? '<tr><td colspan="2" style="color:#f85149;font-weight:700;padding-top:4px">🎙 Sedang siaran PTT</td></tr>' : ''}
        ${e.status==='recording' ? '<tr><td colspan="2" style="color:#3fb950;font-weight:700;padding-top:4px">● Sedang merekam</td></tr>' : ''}
      </table>
    </div>`;
}

function renderMarkers() {
  // hapus semua marker
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  const visible = allPresence.filter(officerVisible).filter(e => e.latitude && e.longitude);
  visible.forEach(e => {
    const m = L.marker([e.latitude, e.longitude], { icon: makeIcon(e) });
    m.bindPopup(popupHtml(e), { maxWidth: 240 });
    m.addTo(map);
    markers[e.username] = m;
  });
}

function fitMarkers() {
  const pts = Object.values(markers).map(m => m.getLatLng());
  if (pts.length === 0) { map.setView(DEFAULT_CENTER, 13); return; }
  if (pts.length === 1) { map.setView(pts[0], 15); return; }
  map.fitBounds(L.latLngBounds(pts), { padding: [50, 50] });
}

function focusOfficer(username) {
  const m = markers[username];
  if (m) { map.setView(m.getLatLng(), 16); m.openPopup(); }
}

// ── OFFICER LIST ─────────────────────────────────────
function renderOfficerList(presence) {
  const el = document.getElementById('officer-list');
  if (!presence || presence.length === 0) {
    el.innerHTML = '<div class="no-data">Belum ada perangkat yang terhubung.<br>Tunggu hingga tester login ke aplikasi.</div>';
    return;
  }
  const sorted = [...presence].sort((a,b) => {
    const rank = e => e.isTalking ? 0 : e.status==='recording' ? 1 : e.resolvedStatus==='online' ? 2 : 3;
    return rank(a) - rank(b);
  });
  el.innerHTML = sorted.map(e => {
    const color = markerColor(e);
    const avatarClass = e.isTalking ? 'talking' : e.status==='recording' ? 'recording' : e.resolvedStatus!=='online' ? 'offline' : '';
    const ch = e.activeChannelId ? e.activeChannelId.toUpperCase() : null;
    const loc = (e.latitude && e.longitude) ? `${e.latitude.toFixed(4)}, ${e.longitude.toFixed(4)}` : null;
    const since = e.lastSeenIso ? new Date(e.lastSeenIso).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}) : '-';
    return `<div class="officer-card ${e.isTalking?'talking':''}" onclick="focusOfficer('${e.username}')">
      <div class="officer-row">
        <div class="officer-avatar ${avatarClass}" style="background:${color}">${initials(e.username)}</div>
        <div style="flex:1;min-width:0">
          <div class="officer-name">${e.username}</div>
          <div class="officer-detail">${e.deviceId || 'Perangkat'} · ${since}</div>
        </div>
      </div>
      <div class="officer-meta">
        <span class="tag ${e.resolvedStatus==='online'?'online':'offline'}">${e.resolvedStatus==='online'?'● Online':'○ Offline'}</span>
        ${e.status==='recording' ? '<span class="tag recording">● Rekam</span>' : ''}
        ${e.isTalking ? '<span class="tag talking">🎙 PTT</span>' : ''}
        ${ch ? `<span class="tag ch">${ch}</span>` : ''}
        ${loc ? `<span class="tag loc">📍 ${loc}</span>` : '<span class="tag">📍 Tidak ada GPS</span>'}
      </div>
    </div>`;
  }).join('');
}

// ── PTT FEED ─────────────────────────────────────────
async function loadPttFeed() {
  let allItems = [];
  const channels = ['ch1','ch2','ch3','ch4'];
  await Promise.all(channels.map(async ch => {
    try {
      const r = await fetch(`${API}/ptt/feed?channelId=${ch}`);
      const items = await r.json();
      items.forEach(item => allItems.push({...item, _channel: ch}));
    } catch(_) {}
  }));
  allItems.sort((a,b) => (b.timeLabel||'').localeCompare(a.timeLabel||''));

  const el = document.getElementById('tab-ptt');
  if (allItems.length === 0) {
    el.innerHTML = '<div class="no-data">Belum ada transmisi PTT.</div>';
    return;
  }
  el.innerHTML = allItems.map(item => {
    const ch = (item._channel||'').toUpperCase();
    return `<div class="feed-item">
      <div class="feed-item-row">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="feed-avatar" style="background:#f85149">${(item.initials||'??').toUpperCase()}</div>
          <div>
            <div class="feed-name">${item.speakerName||'Unknown'}</div>
            <div class="feed-meta">${ch} · Durasi ${item.statusLabel||'-'}</div>
          </div>
        </div>
        <div class="feed-time">${item.timeLabel||'-'}</div>
      </div>
    </div>`;
  }).join('');
}

// ── RECORDINGS ────────────────────────────────────────
async function loadRecordings() {
  try {
    const r = await fetch(`${API}/recordings`);
    const items = await r.json();
    const el = document.getElementById('tab-recordings');
    if (!items || items.length === 0) {
      el.innerHTML = '<div class="no-data">Belum ada rekaman dari perangkat.</div>';
      return;
    }
    document.getElementById('h-pending').textContent = items.filter(i=>i.status==='pending'||i.status==='syncing').length;
    el.innerHTML = items.slice(0, 30).map(item => {
      const statusColor = item.status==='uploaded' ? 'var(--green)' : item.status==='syncing' ? 'var(--blue)' : 'var(--orange)';
      const statusLabel = item.status==='uploaded' ? 'Tersinkron' : item.status==='syncing' ? `Sinkron ${item.syncProgress||0}%` : 'Pending';
      const date = item.recordedAtIso ? new Date(item.recordedAtIso).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '-';
      const size = item.sizeBytes ? (item.sizeBytes/1024/1024).toFixed(1)+' MB' : '-';
      return `<div class="feed-item">
        <div class="feed-item-row">
          <div>
            <div class="feed-name">${item.id||'-'}</div>
            <div class="feed-meta">${item.officerName||'-'} · ${item.unitName||'-'}</div>
          </div>
          <span style="font-size:10px;font-weight:600;color:${statusColor}">${statusLabel}</span>
        </div>
        <div class="feed-desc">${item.locationLabel||'-'} · ${date} · ${size}</div>
      </div>`;
    }).join('');
  } catch(_) {}
}

// ── REPORTS ───────────────────────────────────────────
async function loadReports() {
  try {
    const r = await fetch(`${API}/reports`);
    const items = await r.json();
    const el = document.getElementById('tab-reports');
    if (!items || items.length === 0) {
      el.innerHTML = '<div class="no-data">Belum ada laporan insiden.</div>';
      return;
    }
    document.getElementById('h-reports').textContent = items.length;
    el.innerHTML = items.slice(0,30).map(item => {
      const date = item.recordedAtIso ? new Date(item.recordedAtIso).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '-';
      return `<div class="feed-item">
        <div class="feed-item-row">
          <div>
            <div class="feed-name">${item.type||'Laporan'} <span style="color:var(--muted);font-weight:400;font-size:11px">#${(item.id||'').slice(-8)}</span></div>
            <div class="feed-meta">${item.locationLabel||'-'} · ${date}</div>
          </div>
          <div class="status-dot dot-orange"></div>
        </div>
        <div class="feed-desc">${item.description||'-'}</div>
        ${item.witness ? `<div class="feed-desc" style="margin-top:2px">Saksi: ${item.witness}</div>` : ''}
      </div>`;
    }).join('');
  } catch(_) {}
}

// ── PRESENCE ──────────────────────────────────────────
async function loadPresence() {
  try {
    const r = await fetch(`${API}/presence`);
    allPresence = await r.json();

    const online   = allPresence.filter(e => e.resolvedStatus === 'online');
    const recCount = allPresence.filter(e => e.status === 'recording').length;

    document.getElementById('h-online').textContent    = online.length;
    document.getElementById('h-recording').textContent = recCount;
    document.getElementById('online-badge').textContent = online.length + ' Online';
    document.getElementById('online-badge').className  = 'badge ' + (online.length > 0 ? 'green' : '');

    renderOfficerList(allPresence);
    renderMarkers();
  } catch(_) {}
}

// ── HEALTH ────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`);
    const data = await r.json();
    if (data.status === 'ok') {
      document.getElementById('server-label').textContent = 'Server Online';
    }
  } catch(_) {
    document.getElementById('server-label').textContent = 'Server Terputus';
    document.querySelector('.pulse').style.background = 'var(--red)';
    document.querySelector('.server-badge').style.color = 'var(--red)';
  }
}

// ── TABS ─────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

// ── CLOCK ─────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ── REFRESH LOOP ──────────────────────────────────────
let slowTick = 0;
async function refresh() {
  await Promise.all([loadPresence(), checkHealth()]);
  slowTick++;
  if (slowTick % 2 === 0) await Promise.all([loadPttFeed()]);
  if (slowTick % 4 === 0) await Promise.all([loadRecordings(), loadReports()]);
  const now = new Date();
  document.getElementById('last-refresh').textContent =
    'Diperbarui: ' + now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ── BOOT ──────────────────────────────────────────────
setInterval(updateClock, 1000);
updateClock();
refresh();
setInterval(refresh, REFRESH_MS);
</script>
